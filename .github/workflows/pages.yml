name: Deploy webapp to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update official ETF database
        continue-on-error: true
        run: |
          node webapp/scripts/update-etf-master.js
          node webapp/scripts/update-price-series.js
          node webapp/scripts/update-issuer-official-data.js
          node webapp/scripts/update-stock-master.js
          node webapp/scripts/finalize-data-quality.js

      - name: Validate available ETF database
        run: |
          node webapp/scripts/finalize-data-quality.js
          node webapp/scripts/validate-etf-data.js

      - name: Commit refreshed database
        run: |
          if [ -n "$(git status --porcelain webapp/data/etf-database.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add webapp/data/etf-database.json
            git commit -m "Update ETF database [skip ci]"
            git push
          fi

      - name: Build runtime API configuration
        env:
          BACKEND_API_BASE: ${{ secrets.BACKEND_API_BASE }}
          CONSULTATION_IG_URL: ${{ vars.CONSULTATION_IG_URL }}
          CONSULTATION_LINE_URL: ${{ vars.CONSULTATION_LINE_URL }}
          FULL_REPORT_PRICE_TWD: ${{ vars.FULL_REPORT_PRICE_TWD }}
          CONSULTATION_DEPOSIT_TWD: ${{ vars.CONSULTATION_DEPOSIT_TWD }}
          CONSULTATION_FEE_TWD: ${{ vars.CONSULTATION_FEE_TWD }}
        run: node webapp/scripts/build-runtime-config.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
