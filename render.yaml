services:
  - type: web
    name: small-budget-cashflow-api
    runtime: docker
    region: singapore
    plan: starter
    dockerfilePath: ./webapp/Dockerfile
    dockerContext: ./webapp
    healthCheckPath: /api/health
    envVars:
      - key: CUSTOMER_DATA_KEY
        generateValue: true
      - key: ACCESS_CODE_PEPPER
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: CUSTOMER_DATA_DIR
        value: /data
      - key: CUSTOMER_RETENTION_DAYS
        value: "365"
      - key: MARKET_REFRESH_MINUTES
        value: "15"
      - key: ACTION_DISPATCH_MINUTES
        value: "15"
      - key: ALLOWED_ORIGINS
        value: https://small-budget-cashflow-api.onrender.com,https://shaino0807.github.io
      - key: SITE_PUBLIC_BASE_URL
        value: https://small-budget-cashflow-api.onrender.com
      - key: API_PUBLIC_BASE_URL
        value: https://small-budget-cashflow-api.onrender.com
      - key: AUTH_SESSION_DAYS
        value: "30"
      - key: LINE_LOGIN_CHANNEL_ID
        sync: false
      - key: LINE_LOGIN_CHANNEL_SECRET
        sync: false
      - key: LINE_LOGIN_CALLBACK_URL
        value: https://small-budget-cashflow-api.onrender.com/api/auth/line/callback
      - key: LINE_LIFF_ID
        sync: false
      - key: LINE_LIFF_URL
        sync: false
      - key: GITHUB_REPOSITORY
        value: shaino0807/small-budget-cashflow-web
      - key: GITHUB_WORKFLOW_FILE
        value: pages.yml
      - key: GITHUB_WORKFLOW_REF
        value: main
      - key: GITHUB_ACTIONS_TOKEN
        sync: false
      - key: ECPAY_ENV
        value: stage
      - key: ECPAY_USE_STAGE_DEFAULTS
        value: "1"
      - key: ECPAY_MERCHANT_ID
        sync: false
      - key: ECPAY_HASH_KEY
        sync: false
      - key: ECPAY_HASH_IV
        sync: false
      - key: FULL_REPORT_PRICE_TWD
        value: "499"
      - key: CONSULTATION_DEPOSIT_TWD
        value: "200"
      - key: CONSULTATION_FEE_TWD
        value: "1500"
      - key: CONSULTATION_IG_URL
        value: https://www.instagram.com/chendino080077/
      - key: CONSULTATION_LINE_URL
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_REPLY_DISABLED
        value: "0"
      - key: LINE_RICH_MENU_AUTO_DEPLOY
        value: "1"
      - key: LINE_RICH_MENU_VERSION
        value: "v3"
      - key: LINE_LEDGER_RETENTION_DAYS
        value: "1095"
      - key: LINE_AI_PARSER_ENABLED
        value: "1"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_LINE_PARSER_MODEL
        value: gpt-5.4-nano
    disk:
      name: customer-data
      mountPath: /data
      sizeGB: 1
